name: Package macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify source
        run: pnpm run check

      - name: Electron E2E smoke
        run: pnpm run test:e2e:run

      - name: Build unsigned package
        run: pnpm exec electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Packaged application smoke
        run: pnpm run test:e2e:packaged

      - name: Upload unsigned package
        uses: actions/upload-artifact@v4
        with:
          name: WaveYourYarn-${{ github.ref_name }}-macos-${{ matrix.arch }}-unsigned
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: WaveYourYarn-${{ matrix.arch }}-test-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
